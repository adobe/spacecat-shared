# Docker Compose for integration testing — ClickHouse
name: spacecat-clickhouse-client-test

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "18123:8123"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/clickhouse
      - /var/log/clickhouse-server
