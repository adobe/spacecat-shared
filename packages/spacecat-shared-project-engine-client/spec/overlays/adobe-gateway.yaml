overlay: 1.0.0
info:
  title: Adobe gateway corrections for Project Engine client
  version: 1.0.0
# Applied by scripts/apply-overlay.mjs after swagger2openapi converts the
# vendored Swagger 2.0 spec to OAS 3.0 (build/openapi3.json).
# The vendored file spec/projectengine_swagger_public.yaml is never modified.
#
# CR1  Add GET /v1/ai_models — live endpoint absent from vendored spec.
#      Remove when Semrush ships the path in the upstream swagger.
# CR2  Express Authorization: Bearer as the auth scheme; remove Auth-Data-Jwt.
#      Remove when Semrush fixes securityDefinitions upstream.
actions:
  # CR1: Add GET /v1/ai_models — live endpoint absent from vendored spec.
  # Remove when Semrush ships the path in the upstream swagger.
  - target: "$.components.schemas"
    description: "CR1: add AIModelListResponse envelope"
    update:
      "model.AIModelListResponse":
        type: object
        properties:
          page:  { type: integer }
          total: { type: integer }
          items:
            type: array
            items:
              $ref: "#/components/schemas/model.AIModelResponse"

  - target: "$.paths"
    description: "CR1: add GET /v1/ai_models path"
    update:
      "/v1/ai_models":
        get:
          summary: List global AI model catalog
          description: >
            Global catalog of all AI models available for tracking across any
            workspace. Not scoped to a workspace or project.
          operationId: ai-list-global-models
          tags: [AIO]
          parameters:
            - { name: page,  in: query, schema: { type: integer } }
            - { name: limit, in: query, schema: { type: integer } }
          responses:
            "200":
              description: OK
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/model.AIModelListResponse"
          security:
            - imsBearer: []

  # CR2: Express Authorization: Bearer, remove Auth-Data-Jwt.
  # Remove when Semrush fixes securityDefinitions upstream.
  - target: "$.components.securitySchemes"
    description: "CR2: add imsBearer scheme"
    update:
      imsBearer:
        type: http
        scheme: bearer
        description: >
          IMS user bearer token. Adobe gateway authenticates the bearer and
          exchanges it for Semrush credentials server-side.

  - target: "$"
    description: "CR2: apply imsBearer globally"
    update:
      security:
        - imsBearer: []

  # Array-element removal (Auth-Data-Jwt header param) is implemented
  # procedurally in apply-overlay.mjs — JSONPath filter expressions on
  # array indices are not supported by the lightweight script.
  - target: "$.paths.*.*.parameters[?(@.name == 'Auth-Data-Jwt')]"
    description: "CR2: remove Auth-Data-Jwt header param from all operations (procedural)"
    remove: true
