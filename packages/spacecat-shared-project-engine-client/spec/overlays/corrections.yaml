overlay: 1.0.0
info:
  title: Project Engine spec corrections — align the vendored swagger with the live API
  version: 1.0.0
# The single source of truth for our corrections to the vendored Semrush spec.
# scripts/apply-overlay.mjs reads THIS file and applies the actions to the
# swagger2openapi output (build/openapi3.json); the vendored
# spec/projectengine_swagger_public.yaml is never modified.
#
# CR1  Add GET /v1/ai_models — live endpoint absent from the vendored spec.
#      Remove when Semrush ships the path in the upstream swagger.
# CR2  Express Authorization: Bearer as the auth scheme; remove Auth-Data-Jwt.
#      Remove when Semrush fixes securityDefinitions upstream.
# CR3  Correct GET /v2/.../projects summary+description — it also returns initial
#      (never-yet-published) drafts, not only published projects.
# CR4  Relocate the workspace `id` parameter from query → path. 11 operations
#      declare `id` as `in: query` though `{id}` is a path-template variable in
#      every one of them; openapi-typescript then emits an unsatisfiable `{id}`
#      path key + a `query: { id }`, so a caller passing the runtime-correct
#      `path: { id }` fails to type-check. Remove when Semrush fixes the param
#      location upstream.
actions:
  # ── CR1: Add GET /v1/ai_models ──────────────────────────────────────────
  # Live: 200 -> { page:int, total:int, items:[AIModelResponse] }.
  # Verified: GET /v1/ai_models?page=1&limit=100 -> 200 (rainer-friederich, 2026-06-15).
  - target: "$.components.schemas"
    description: "CR1: add the AIModelListResponse envelope schema"
    update:
      "model.AIModelListResponse":
        type: object
        properties:
          page: { type: integer }
          total: { type: integer }
          items:
            type: array
            items:
              $ref: "#/components/schemas/model.AIModelResponse"

  - target: "$.paths"
    description: "CR1: add the GET /v1/ai_models path"
    update:
      "/v1/ai_models":
        get:
          summary: "List global AI model catalog"
          description: "Global catalog of all AI models available for tracking across any workspace. Not scoped to a workspace or project."
          operationId: "ai-list-global-models"
          tags: ["AIO"]
          parameters:
            - { name: page, in: query, schema: { type: integer } }
            - { name: limit, in: query, schema: { type: integer } }
          responses:
            "200":
              description: "OK"
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/model.AIModelListResponse"
            "401":
              description: "Unauthorized"
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/http_server.BasicResponse"
          security:
            - imsBearer: []

  # ── CR2: Express Authorization: Bearer, remove Auth-Data-Jwt ─────────────
  # Live API: Authorization: Bearer <IMS> -> 200; Auth-Data-Jwt -> 401.
  - target: "$.components.securitySchemes"
    description: "CR2: add the imsBearer security scheme"
    update:
      imsBearer:
        type: http
        scheme: bearer
        description: "IMS user bearer token, accepted directly by the Semrush Project Engine API."

  - target: "$"
    description: "CR2: apply imsBearer as the global security requirement"
    update:
      security:
        - imsBearer: []

  - target: "$.paths.*.*.parameters[?(@.name == 'Auth-Data-Jwt')]"
    description: "CR2: remove the Auth-Data-Jwt header param from every operation"
    remove: true

  # ── CR3: Correct the GET /v2/.../projects "published only" claim ─────────
  # Upstream says it returns only published projects; in fact a project that has
  # never been published yet (its initial draft) also appears, and once published
  # at least once the list reflects the published view. Text-only fix.
  - target: "$.paths['/v2/workspaces/{id}/projects'].get"
    description: "CR3: correct the summary+description (also returns initial drafts)"
    update:
      summary: "List V2 projects for the workspace (lightweight, for selectors)"
      # Folded scalar (>-): authored multi-line for review, emitted as one line.
      description: >-
        List V2 projects for the workspace — a lightweight view suitable for
        selectors. Maximum 100 items per page. Supports product-specific default
        sorting and custom sorting via query parameters. Note: contrary to the
        upstream description, this does not return only published (live) projects —
        a project that has never been published yet (its initial draft) also appears
        in this list; once a project has been published at least once, the list
        reflects its published view.

  # ── CR4: Workspace `id` is a path param on every operation, not query ─────
  # Verified: all 11 operations that declare `id` as `in: query` have `{id}` in
  # their path template, and the other 87 `id` params are already `in: path`, so
  # forcing every `id` param to `in: path` corrects the 11 and is a no-op for the
  # rest. The single-equality overlay filter cannot express "name == 'id' && in ==
  # 'query'", but the blanket flip is equivalent and safe here. deep-merge sets
  # `in` to `path` (scalar overwrite); `required: true` is already present.
  - target: "$.paths.*.*.parameters[?(@.name == 'id')]"
    description: "CR4: workspace `id` is a path parameter on every operation (not query)"
    update:
      in: path
