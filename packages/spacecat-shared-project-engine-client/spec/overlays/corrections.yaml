overlay: 1.0.0
info:
  title: Project Engine spec corrections — align the vendored swagger with the live API
  version: 1.0.0
# The single source of truth for our corrections to the vendored Semrush spec.
# scripts/apply-overlay.mjs reads THIS file and applies the actions to the
# swagger2openapi output (build/openapi3.json); the vendored
# spec/projectengine_swagger_public.yaml is never modified.
#
# CR1  Add GET /v1/ai_models — live endpoint absent from the vendored spec.
#      Remove when Semrush ships the path in the upstream swagger.
# CR2  Express Authorization: Bearer as the auth scheme; remove Auth-Data-Jwt.
#      Remove when Semrush fixes securityDefinitions upstream.
# CR3  Correct GET /v2/.../projects summary+description — it also returns initial
#      (never-yet-published) drafts, not only published projects.
# CR4  Relocate the workspace `id` parameter from query → path. 11 operations
#      declare `id` as `in: query` though `{id}` is a path-template variable in
#      every one of them; openapi-typescript then emits an unsatisfiable `{id}`
#      path key + a `query: { id }`, so a caller passing the runtime-correct
#      `path: { id }` fails to type-check. Remove when Semrush fixes the param
#      location upstream.
# CR5  Mark the always-present identity fields `required` on the response schemas
#      the stateful mock serves (projects, ai_models, prompts read paths). The
#      vendored swagger marks NO response field required, so openapi-typescript
#      emits everything optional — which lets typed fixtures silently omit fields
#      and degrade fidelity. We require only fields the live API always returns AND
#      that the mock's own create handlers populate, so generated types gain real
#      enforcement (factories must supply them; Counterfact validates them at
#      runtime) without misrepresenting the vendor. Notably AIModelResponse keeps
#      only `id` required: the live shapes vary in which optional fields appear
#      (e.g. the add path `POST .../ai_models {model_id}` returns `name` + `icon`
#      but an EMPTY `key` — verified 2026-06-25), so requiring more than `id` would
#      risk a false `required` claim. Narrow/remove if a spec refresh adds upstream
#      `required` arrays.
# CR6  createProjectTags (POST /v2/.../aio/tags) returns a TOP-LEVEL ARRAY of
#      TreeNodeResponse, not a single object. The vendored swagger types the 201 as
#      one `model.TreeNodeResponse`, so Counterfact's mock returned an object while the
#      live API returns `[{ id, name, children_count, keyword_count }]` (verified
#      2026-06-25 against prod). Retype the 201 as an array. Remove if Semrush fixes it.
# CR7  addAiModel v2 (POST /v2/.../ai_models) returns 201, not 200. The vendored swagger
#      declares the success response under 200; the live API responds 201 Created
#      (verified 2026-06-25 against prod). Move the response to 201 so the type, the mock,
#      and the live API agree. Remove if Semrush changes the status upstream.
# CR8  init_status lives on /v2, not /v1. The vendored swagger declares
#      GET /v1/.../aio/init_status, but that path 404s live while
#      GET /v2/.../aio/init_status -> 200 { initialized } (verified 2026-06-25 against prod;
#      OPTIONS /v2 -> allow: GET, OPTIONS /v1 -> 404). Relocate the path to v2 so the typed
#      client + mock match the live API. The consumer (spacecat-api-service rest-transport
#      `getInitStatus`) must call /v2 too. Remove if Semrush adds the v1 alias upstream.
# CR9  Add `primary_url` to model.AISettings. The live `settings.ai` returns `primary_url` (the
#      project's own domain) on every project — verified 2026-06-25 against the test workspace
#      (`GET .../projects/{id}` and the `POST .../projects` create response) — but the vendored
#      swagger's AISettings schema omits it, so a typed fixture/handler that populates it fails
#      tsc. Add it (string) so the type, the factory, and the live API agree. Remove if Semrush
#      adds the field upstream.
# CR10 Add `primary_url` + `root_domain` to model.AIOBenchmarkWithCounters. The live benchmarks
#      list returns both alongside the already-present `project_id` (verified 2026-06-25 against
#      prod) — same pattern as CR9 — but the vendored swagger omits them. Add them (string).
#      Remove if Semrush adds the fields upstream.
# CR11 aio-update-tag (PATCH /v2/.../aio/tags/{tag_id}) responds 200, not 201. The vendored swagger
#      declares the success response under 201; the live API responds 200 OK (verified 2026-07-01
#      against prod `adobe-hackathon.semrush.com`, workspace bb0f4e1c-… child, PATCH re-parent+rename
#      of a tag → 200 with the updated TreeNodeResponse). Move the response 201→200 so the type, the
#      mock, and the live API agree. Remove if Semrush changes the status upstream.
# CR12 aio-update-tag returns 404 (not 500) for an unknown tag id. The vendored swagger declares no
#      404; the live API responds `404 {"message":"not found"}` for a missing tag (verified
#      2026-07-01 against prod — same shape as the projects delete/patch 404). Add a 404 response
#      (http_server.BasicResponse) so the mock can return the live status and Counterfact response
#      validation accepts it. Remove if Semrush declares/relocates it upstream.
# CR13 model.AIOTag `parent_id` + `path` are NULLABLE. The live tag read returns `parent_id: null`
#      and `path: null` for a flat / root tag (no parent), not an omitted field or an empty array
#      (verified 2026-07-01 against prod). The vendored swagger types them non-nullable, so a mock
#      emitting the live `null` fails response validation / the generated type. Mark both nullable.
#      Remove if Semrush stops returning null (e.g. omits the fields) upstream.
# CR14 aio-create-prompt-v2 (POST /v2/.../aio/prompts) responds with a paginated list wrapper
#      `{page, total, items:[{id,name}], existing_count}`, not a bare `model.StringIDName`
#      (verified 2026-07-02 against prod). Reuses the already-vendored `StringIDNameListResponse`
#      wrapper (extended with `existing_count`) instead of a new schema. Remove if Semrush retypes
#      the response upstream.
#
# Freshness gate: test/overlay.test.js asserts every action above still APPLIES (matches >0
# nodes) and is still NECESSARY (changes the converted vendored swagger) — so a re-vendored
# spec that makes a correction stale or redundant fails CI. `npm run spec:overlay` likewise
# exits non-zero on a stale (0-match) correction.
actions:
  # ── CR1: Add GET /v1/ai_models ──────────────────────────────────────────
  # Live: 200 -> { page:int, total:int, items:[AIModelResponse] }.
  # Verified: GET /v1/ai_models?page=1&limit=100 -> 200 (rainer-friederich, 2026-06-15).
  - target: "$.components.schemas"
    description: "CR1: add the AIModelListResponse envelope schema"
    update:
      "model.AIModelListResponse":
        type: object
        properties:
          page: { type: integer }
          total: { type: integer }
          items:
            type: array
            items:
              $ref: "#/components/schemas/model.AIModelResponse"

  - target: "$.paths"
    description: "CR1: add the GET /v1/ai_models path"
    update:
      "/v1/ai_models":
        get:
          summary: "List global AI model catalog"
          description: "Global catalog of all AI models available for tracking across any workspace. Not scoped to a workspace or project."
          operationId: "ai-list-global-models"
          tags: ["AIO"]
          parameters:
            - { name: page, in: query, schema: { type: integer } }
            - { name: limit, in: query, schema: { type: integer } }
          responses:
            "200":
              description: "OK"
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/model.AIModelListResponse"
            "401":
              description: "Unauthorized"
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/http_server.BasicResponse"
          security:
            - imsBearer: []

  # ── CR2: Express Authorization: Bearer, remove Auth-Data-Jwt ─────────────
  # Live API: Authorization: Bearer <IMS> -> 200; Auth-Data-Jwt -> 401.
  - target: "$.components.securitySchemes"
    description: "CR2: add the imsBearer security scheme"
    update:
      imsBearer:
        type: http
        scheme: bearer
        description: "IMS user bearer token, accepted directly by the Semrush Project Engine API."

  - target: "$"
    description: "CR2: apply imsBearer as the global security requirement"
    update:
      security:
        - imsBearer: []

  - target: "$.paths.*.*.parameters[?(@.name == 'Auth-Data-Jwt')]"
    description: "CR2: remove the Auth-Data-Jwt header param from every operation"
    remove: true

  # ── CR3: Correct the GET /v2/.../projects "published only" claim ─────────
  # Upstream says it returns only published projects; in fact a project that has
  # never been published yet (its initial draft) also appears, and once published
  # at least once the list reflects the published view. Text-only fix.
  - target: "$.paths['/v2/workspaces/{id}/projects'].get"
    description: "CR3: correct the summary+description (also returns initial drafts)"
    update:
      summary: "List V2 projects for the workspace (lightweight, for selectors)"
      # Folded scalar (>-): authored multi-line for review, emitted as one line.
      description: >-
        List V2 projects for the workspace — a lightweight view suitable for
        selectors. Maximum 100 items per page. Supports product-specific default
        sorting and custom sorting via query parameters. Note: contrary to the
        upstream description, this does not return only published (live) projects —
        a project that has never been published yet (its initial draft) also appears
        in this list; once a project has been published at least once, the list
        reflects its published view.

  # ── CR4: Workspace `id` is a path param on every operation, not query ─────
  # Verified: all 11 operations that declare `id` as `in: query` have `{id}` in
  # their path template, and the other 87 `id` params are already `in: path`, so
  # forcing every `id` param to `in: path` corrects the 11 and is a no-op for the
  # rest. The single-equality overlay filter cannot express "name == 'id' && in ==
  # 'query'", but the blanket flip is equivalent and safe here. deep-merge sets
  # `in` to `path` (scalar overwrite); `required: true` is already present.
  # CAUTION (for future spec-refresh reviewers): this is a BLANKET filter on the
  # param name alone. If a future spec revision adds a legitimately query-bound
  # parameter literally named `id` on some new operation, this overlay would
  # silently relocate it to `in: path`. If that ever happens, narrow the filter
  # (or special-case that operation) rather than dropping CR4.
  - target: "$.paths.*.*.parameters[?(@.name == 'id')]"
    description: "CR4: workspace `id` is a path parameter on every operation (not query)"
    update:
      in: path

  # ── CR5: Require the always-present identity fields on served responses ───
  - target: "$.components.schemas['model.ProjectResponse']"
    description: "CR5: a project response always carries id + name"
    update:
      required: [id, name]

  - target: "$.components.schemas['model.ProjectAIModelResponse']"
    description: "CR5: an assigned model always carries id + model + prompts_count"
    update:
      required: [id, model, prompts_count]

  - target: "$.components.schemas['model.AIModelResponse']"
    description: "CR5: a catalog model always carries id (name/icon present on add, key empty there)"
    update:
      required: [id]

  - target: "$.components.schemas['model.AIOPromptWithStatus']"
    description: "CR5: a prompt-with-status always carries id + name + tags"
    # `is_new` is NOT marked required: the live `by_tags` list omits it (verified
    # 2026-06-25 against prod), most likely an omit-when-false boolean. Requiring it
    # would misrepresent the live API and make the type lie. It stays an optional
    # property (the mock may still populate it; that is a spec-valid superset).
    update:
      required: [id, name, tags]

  - target: "$.components.schemas['model.AIOBenchmarkWithCounters']"
    description: "CR5: a listed benchmark always carries id (the benchmark_id brand URLs attach to)"
    # Now that benchmarks are stateful-served by the mock, the served list item always has an id
    # (verified live 2026-06-25). Conservative: id only — brand_name/domain can legitimately be
    # absent on a sparse competitor row.
    update:
      required: [id]

  - target: "$.components.schemas['model.BrandURL']"
    description: "CR5: a listed brand URL always carries id"
    update:
      required: [id]

  - target: "$.components.schemas['model.AIOTag']"
    description: "CR5: a listed/stored project tag always carries id"
    # Now that project tags are stateful-served by the mock (GET /aio/tags), the served list item
    # always has an id (the deterministic `tag-<name>`). Conservative: id only — the count fields
    # default to 0 but are not asserted required, and parent_id/path are absent on a flat tag.
    update:
      required: [id]

  # ── CR6: createProjectTags returns a top-level ARRAY ─────────────────────
  # Live: POST /v2/.../aio/tags -> 201 [{ id, name, children_count, keyword_count }].
  # The vendored 201 schema is a single TreeNodeResponse; replace it with an array.
  # Two actions: drop the scalar `$ref` (deep-merge cannot overwrite an object node),
  # then set the array schema in its place.
  - target: "$.paths['/v2/workspaces/{id}/projects/{project_id}/aio/tags'].post.responses['201'].content['application/json'].schema.$ref"
    description: "CR6: drop the single-object $ref on the tags-create 201"
    remove: true
  - target: "$.paths['/v2/workspaces/{id}/projects/{project_id}/aio/tags'].post.responses['201'].content['application/json'].schema"
    description: "CR6: the tags-create 201 is an array of TreeNodeResponse"
    update:
      type: array
      items:
        $ref: "#/components/schemas/model.TreeNodeResponse"

  # ── CR7: addAiModel v2 responds 201, not 200 ─────────────────────────────
  # Live: POST /v2/.../ai_models -> 201 ProjectAIModelResponse. Move the success
  # response from 200 to 201 so the type, the Counterfact mock, and the live API agree.
  # Add the 201 (copy of the 200 body), then remove the stale 200.
  - target: "$.paths['/v2/workspaces/{id}/projects/{project_id}/ai_models'].post.responses"
    description: "CR7: add the 201 Created success response on the v2 ai_models add"
    update:
      "201":
        description: "Created"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/model.ProjectAIModelResponse"
  - target: "$.paths['/v2/workspaces/{id}/projects/{project_id}/ai_models'].post.responses['200']"
    description: "CR7: remove the stale 200 success response on the v2 ai_models add"
    remove: true

  # ── CR8: init_status is a /v2 route, not /v1 ─────────────────────────────
  # Live: GET /v2/.../aio/init_status -> 200 { initialized }; the /v1 path 404s.
  - target: "$.paths"
    description: "CR8: add the GET /v2/.../aio/init_status path (the live location)"
    update:
      "/v2/workspaces/{id}/projects/{project_id}/aio/init_status":
        get:
          summary: "AIO project initialization status"
          description: "Check whether AIO project initialization has finished for the workspace and project."
          operationId: "aio-get-project-init-status-v2"
          tags: ["AIO"]
          parameters:
            - { name: id, in: path, required: true, schema: { type: string } }
            - { name: project_id, in: path, required: true, schema: { type: string } }
          responses:
            "200":
              description: "OK"
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/model.AIOProjectInitializedResponse"
            "401":
              description: "Unauthorized"
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/http_server.BasicResponse"
          security:
            - imsBearer: []
  - target: "$.paths['/v1/workspaces/{id}/projects/{project_id}/aio/init_status']"
    description: "CR8: remove the stale /v1 init_status path (404s live)"
    remove: true

  # ── CR9: AISettings carries primary_url (live), absent from the vendored swagger ──
  # Live: GET/POST projects → settings.ai.primary_url = the project's own domain. Deep-merge adds
  # the property alongside the existing AISettings properties (does not clobber them).
  - target: "$.components.schemas['model.AISettings']"
    description: "CR9: add primary_url to AISettings (live returns it; vendored swagger omits it)"
    update:
      properties:
        primary_url: { type: string }

  # ── CR10: AIOBenchmarkWithCounters carries primary_url + root_domain (live), absent from swagger ──
  # Live: GET /v1/.../ai_models/benchmarks → each aio_benchmark carries primary_url + root_domain
  # alongside the already-present project_id. Verified live 2026-06-25 against a real project's
  # main-brand + competitor benchmarks: both equalled the benchmark's domain (the fixtures were bare
  # domains; the mock mirrors the domain and does NOT extract a registrable root — a known
  # simplification, faithful for bare-domain rows). primary_url and root_domain are absent from the
  # vendored swagger (the CR9 pattern). Deep-merge adds the
  # properties alongside the existing ones. Kept optional (like CR9), not required: the factory
  # always populates them, but a sparse stored row stays spec-valid.
  - target: "$.components.schemas['model.AIOBenchmarkWithCounters']"
    description: "CR10: add primary_url + root_domain to AIOBenchmarkWithCounters (live returns them; vendored swagger omits them)"
    update:
      properties:
        primary_url: { type: string }
        root_domain: { type: string }

  # ── CR11: aio-update-tag success is 200, not 201 ─────────────────────────
  # Live: PATCH /v2/.../aio/tags/{tag_id} -> 200 TreeNodeResponse (verified 2026-07-01 against prod).
  # Add the 200 (copy of the 201 body), then remove the stale 201 (mirrors the CR7 pattern).
  - target: "$.paths['/v2/workspaces/{id}/projects/{project_id}/aio/tags/{tag_id}'].patch.responses"
    description: "CR11: add the 200 OK success response on aio-update-tag"
    update:
      "200":
        description: "OK"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/model.TreeNodeResponse"
  - target: "$.paths['/v2/workspaces/{id}/projects/{project_id}/aio/tags/{tag_id}'].patch.responses['201']"
    description: "CR11: remove the stale 201 success response on aio-update-tag"
    remove: true

  # ── CR12: aio-update-tag returns 404 for an unknown tag id ────────────────
  # Live: PATCH .../aio/tags/<bogus> -> 404 {"message":"not found"} (verified 2026-07-01 against
  # prod). The vendored swagger declares no 404; add it (http_server.BasicResponse) so the mock can
  # return the live status and Counterfact response validation accepts it.
  - target: "$.paths['/v2/workspaces/{id}/projects/{project_id}/aio/tags/{tag_id}'].patch.responses"
    description: "CR12: add the 404 Not Found response on aio-update-tag"
    update:
      "404":
        description: "Not Found"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/http_server.BasicResponse"

  # ── CR13: AIOTag parent_id + path are nullable (roots return null) ────────
  # Live: a flat / root tag reads back `parent_id: null` and `path: null` (verified 2026-07-01
  # against prod) — not an omitted field or an empty array. Deep-merge adds `nullable: true` to the
  # existing property nodes (keeps their type/items).
  - target: "$.components.schemas['model.AIOTag']"
    description: "CR13: AIOTag parent_id + path are nullable (roots return null)"
    update:
      properties:
        parent_id: { type: string, nullable: true }
        path:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/model.AIOTagLeaf"

  # ── CR14: aio-create-prompt-v2 (POST /v2/.../aio/prompts) returns 201 with a
  # paginated list wrapper, not 200 with a bare StringIDName ─────────────────
  # Live: POST /v2/.../aio/prompts -> 201 { page, total, items: [{id, name}], existing_count }
  # (verified 2026-07-02 against prod, a single-item batch — serenity-docs#24 §3.1 gate 2). The
  # vendored swagger documents only a 200 typed as one `model.StringIDName` ({id, name}) — BOTH the
  # status code and the body shape are wrong. The sibling name-based create endpoint
  # (aio/prompts/tagged, `aio-create-prompts-with-tags`) already correctly documents 201 in this
  # same vendored swagger, so this looks like an upstream copy/paste inconsistency specific to the
  # v2 (id-based) variant. The wrapper shape already exists as `model.StringIDNameListResponse`
  # ({items: [StringIDName], page, total}, used by two unrelated deprecated endpoints), just
  # missing `existing_count` — extend it (CR14a) and replace the stale 200 with a 201 pointed at it
  # (CR14b removes the stale 200 entirely, CR14c adds the 201; the remove-then-add pattern is
  # required because deepMerge recurses into an existing object value rather than replacing it, so
  # updating `schema` in place would leave the old `$ref` behind alongside the new shape — see
  # CR7/CR11 for the same pattern on other endpoints).
  - target: "$.components.schemas['model.StringIDNameListResponse']"
    description: "CR14a: add existing_count to StringIDNameListResponse (live returns it on aio-create-prompt-v2 ONLY, not the two deprecated endpoints also using this schema; kept optional so it stays spec-valid there too)"
    update:
      properties:
        existing_count: { type: integer }
  - target: "$.paths['/v2/workspaces/{id}/projects/{project_id}/aio/prompts'].post.responses['200']"
    description: "CR14b: remove the stale 200 (wrong status code AND wrongly typed as bare StringIDName) on aio-create-prompt-v2"
    remove: true
  - target: "$.paths['/v2/workspaces/{id}/projects/{project_id}/aio/prompts'].post.responses"
    description: "CR14c: add the 201 Created success response on aio-create-prompt-v2, typed as the list wrapper (live returns 201, matching the sibling aio/prompts/tagged create endpoint's status code)"
    update:
      "201":
        description: "Created"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/model.StringIDNameListResponse"
