info:
  contact: {}
  description: This is the Semrush Enterprise Solutions (ES) Project Engine API. The
    Project Engine handles projects for the ES.
  title: Project Engine API
  version: "1.0"
paths:
  /v1/countries:
    get:
      consumes:
      - application/json
      description: list countries
      operationId: projects-admin-list-countries
      parameters:
      - description: JWT Token
        in: header
        name: Auth-Data-Jwt
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.CountryListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: list countries
      tags:
      - Suggestions
  /v1/languages:
    get:
      consumes:
      - application/json
      description: list languages
      operationId: projects-admin-list-languages
      parameters:
      - description: JWT Token
        in: header
        name: Auth-Data-Jwt
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.LanguageListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: list languages
      tags:
      - Suggestions
  /v1/locations/resolve:
    post:
      consumes:
      - application/json
      description: Resolves input location strings against projectengine location
        data using Postgres similarity matching.
      operationId: resolve-locations
      parameters:
      - description: JWT Token
        in: header
        name: Auth-Data-Jwt
        required: true
        type: string
      - description: Location resolution request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.ResolveLocationsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ResolveLocationsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: Resolve locations
      tags:
      - Locations
  /v1/workspaces/{id}/brand-topics:
    get:
      description: Returns top 10 brand topics with their search volume and up to
        100 prompts each, fetched directly from the AI-SEO service.
      parameters:
      - description: JWT Token
        in: header
        name: Auth-Data-Jwt
        required: true
        type: string
      - description: Workspace UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Target domain
        example: '"example.com"'
        in: query
        name: domain
        required: true
        type: string
      - description: Country code
        example: '"US"'
        in: query
        name: country
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/aiseo.BrandTopicWithPrompts'
            type: array
        "400":
          description: Bad Request - Missing or invalid parameters
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "401":
          description: Unauthorized - Missing or invalid JWT token
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden - Insufficient permissions
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: Get brand topics with prompts
      tags:
      - AI-SEO
  /v1/workspaces/{id}/keywords:
    get:
      consumes:
      - application/json
      description: |-
        [DEPRECATED] list keywords for workspace with given ID. Keywords are non-hierarchical data.
        Note: When type parameter is empty, the endpoint returns both prompts and brand names.
        In this case, pagination is applied separately to each type, so the total number of items
        in the response may be up to 2x the limit parameter (e.g., limit=10 may return up to 20 items).
        For proper pagination, specify the type parameter (either "prompt" or "brand_name").
      operationId: workspace-list-keywords
      parameters:
      - description: JWT Token
        in: header
        name: Auth-Data-Jwt
        required: true
        type: string
      - description: page number
        in: query
        name: page
        type: integer
      - description: limit per page
        in: query
        name: limit
        type: integer
      - description: search query
        in: query
        name: search
        type: string
      - description: tag type
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.StringIDNameListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: list keywords for workspace
      tags:
      - Suggestions
  /v1/workspaces/{id}/projects:
