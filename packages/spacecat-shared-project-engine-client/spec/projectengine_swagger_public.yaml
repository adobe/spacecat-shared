  /v1/workspaces/{id}/projects/multi-type:
    get:
      consumes:
      - application/json
      description: |-
        Retrieve projects from workspace supporting multiple project types with cursor-based pagination.
        This endpoint allows fetching projects of different types (SEO, AIO, SI, CI, MFOUR, JOURNEY) in a single request.
        Projects are sorted by their source-specific ordering and merged in a deterministic way.
        Uses cursor-based pagination for efficient navigation through large datasets.
      operationId: projects-list-projects-multi-type
      parameters:
      - description: JWT Token
        in: header
        name: Auth-Data-Jwt
        required: true
        type: string
      - description: 'Number of projects per page (default: 25, max: 100)'
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Comma-separated project types
        example: '"SEO,AIO,SI,JOURNEY"'
        in: query
        name: types
        required: true
        type: string
      - default: false
        description: Show live projects instead of draft projects
        in: query
        name: live
        type: boolean
      - description: Search query to filter projects by name
        example: '"my project"'
        in: query
        name: search
        type: string
      - description: Pagination cursor (base64 encoded). Leave empty for first page
        example: '"eyJTRU9PZmZzZXQiOjI1LCJBSU9PZmZzZXQiOjE1fQ=="'
        in: query
        name: cursor
        type: string
      - description: Workspace UUID
        example: '"123e4567-e89b-12d3-a456-426614174000"'
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved projects with pagination info
          schema:
            $ref: '#/definitions/model.ProjectListWithCursorResponse'
        "400":
          description: Bad Request - Invalid parameters
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "401":
          description: Unauthorized - Missing or invalid JWT token
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden - Insufficient permissions
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: List projects for workspace with multiple types
      tags:
      - Projects
