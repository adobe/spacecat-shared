        name: Auth-Data-Jwt
        required: true
        type: string
      - description: workspace ID
        in: path
        name: id
        required: true
        type: string
      - description: project ID
        in: path
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: delete a project
      tags:
      - Projects
    get:
      consumes:
      - application/json
      description: get project in workspace with given IDs
      operationId: projects-get-project
      parameters:
      - description: JWT Token
        in: header
        name: Auth-Data-Jwt
