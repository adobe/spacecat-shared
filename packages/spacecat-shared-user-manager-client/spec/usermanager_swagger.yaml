info:
  contact: {}
  description: This is the Semrush Enterprise Solutions (ES) User Manager API. The
    User Manager handles everything around
  title: User Manager API
  version: "1.0"
paths:
  /v1/admin/core-users:
    get:
      consumes:
      - application/json
      description: gets core users with ids
      operationId: admin-core-users-list
      parameters:
      - description: API key
        in: header
        name: API-Key
        required: true
        type: string
      - collectionFormat: csv
        description: user id
        format: multi
        in: query
        items:
          type: string
        name: user_id
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.CoreUserWithAPIKey'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: gets core users by ids
      tags:
      - Admin
  /v1/admin/users:
    post:
      consumes:
      - application/json
      description: |-
        Creates a new enterprise user based on an existing Semrush user and workspace if provided.
        Leave workspace as null to create user w/o workspace.
      operationId: users-create
      parameters:
      - description: Admin API key
        in: header
        name: API-Key
        required: true
        type: string
      - description: request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.usersCreateForm'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "403":
          description: Forbidden
        "422":
          description: Unprocessable Entity
        "500":
          description: Internal Server Error
      summary: Create a new user and master workspace
      tags:
      - Admin
  /v1/admin/users/billing-status:
    post:
      consumes:
      - application/json
      description: Returns billing status for multiple users by user IDs
      operationId: admin-get-user-billing-statuses
      parameters:
      - description: Admin API key
        in: header
        name: API-Key
        required: true
        type: string
      - description: List of user IDs
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.userIDsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.billingStatusResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: Get billing status for users
      tags:
      - Admin
  /v1/admin/users/expired:
    get:
      consumes:
      - application/json
      operationId: expired-subscription-users
      parameters:
      - description: Admin API key
        in: header
        name: API-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.CoreUser'
            type: array
        "403":
          description: Forbidden
        "422":
          description: Unprocessable Entity
        "500":
          description: Internal Server Error
      summary: Gets a list of users which have expired subscriptions
      tags:
      - Admin
  /v1/admin/workspaces:
    post:
      consumes:
      - application/json
      description: creates a child workspace
      operationId: admin-workspace-child-create
      parameters:
      - description: request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.adminWorkspaceCreateForm'
      - description: Admin API key
        in: header
        name: API-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.workspaceResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: creates a child workspace
      tags:
      - Admin
  /v1/admin/workspaces/{id}/partnership:
    patch:
      description: This API updates the partnership flag for a workspace.
      operationId: admin-workspace-update-partnership
      parameters:
      - description: API key
        in: header
        name: API-Key
        required: true
        type: string
      - description: Workspace ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Request body containing partnership flag
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/page-engine-backend_internal_usermanager_core_domain.WorkspacePartnership'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad request, invalid input parameters
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
