        to child workspaces
      tags:
      - Admin
    post:
      description: |-
        This API allows adding a product and its tier to the master workspace.
        If the product already exists, the tier will be updated for the workspace.
        For root workspaces, the product is added or updated only in the root workspace.
        Note: This API cannot be used to add products and tiers to non-master workspaces.
