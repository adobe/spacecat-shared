    get:
      description: |-
        Checks whether the user has membership in the workspace hierarchy (current workspace + descendants).
        If the optional `membership` query parameter is provided, only those statuses are treated as valid.
        Valid values: `member`, `guest`, `basic`.
        If `membership` is omitted, the default behavior is backward compatible: membership is checked by subscription match
        (`user.SubscriptionID == desc.SubscriptionID`), not by membership status.
      operationId: workspaces-check-membership-in-ancestry
      parameters:
      - description: JWT Token
        in: header
        name: Auth-Data-Jwt
        required: true
        type: string
      - description: workspace id
        in: path
        name: userId
        required: true
        type: integer
      - collectionFormat: csv
        description: 'Filter by membership status. If provided, only these statuses
          are considered valid. Allowed: member, guest, basic.'
        in: query
        items:
          type: string
        name: membership
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.workspaceCheckMembershipInAncestryResponse'
        "401":
