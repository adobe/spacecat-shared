      name:
        type: string
      objective_value_type:
        allOf:
        - $ref: '#/definitions/page-engine-backend_internal_usermanager_core_domain.GoalObjectiveValueType'
        description: |-
          ### Single objective value
          `value` is used for `single` `objective_value_type`
          ### Multiple objective values
          `values` is used for `multiple` `objective_value_type`
      type:
        allOf:
        - $ref: '#/definitions/page-engine-backend_internal_usermanager_core_domain.GoalType'
        description: |-
          ### Threshold goal
          `upper_value` and `lower_value` are used for threshold goals
          ### Objective goal
          `date_type`, `date_from`, `date_to`, `value`, `objective_value_type`, `values` are used for objective goals
      upper_value:
        description: Is set when the goal is threshold
        type: number
      value:
        description: Set when the goal is single objective
        type: number
      values:
        description: Set when the goal is multiple objective
        items:
