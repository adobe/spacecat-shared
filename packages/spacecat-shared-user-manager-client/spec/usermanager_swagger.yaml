  /v1/internal/workspaces/{id}/projects/{project_id}/segments:
    get:
      consumes:
      - application/json
      description: |-
        gets a list of segments that belong to a project.
        *filters* here is the exact representation of the filters in the pagemanager.
        **<u>filters representations:</u>**
        `col` is one of *url, keyword*. Note: *url_list* is represented as *url* in pagemanager.
        `op` is one of *and, or, eq, neq, begins_with, not_begins_with, ends_with, not_ends_with, contains,
        not_contains, gt, lt, gte, lte, in*.
        `value` is string type. It becomes array of string in case of *in* operator as an exceptional case.
        *Notes*:
        * *url_list* always has *in* operator. Only zero or one url_list contains in the whole filters object.
        * *filters* logical operators *and, or* will not have *col, value* and will have nested *filters*.
        * *filters* logical operators *and, or* will have maximum depth up to 5 levels from the root.
        * *filters* non-logical operators will have *col, value* and will not have nested *filters*.
        * *filters* non-logical operators will have maximum 20 leaves in a single filter object.
      operationId: internal-project-segment-list-get
      parameters:
      - description: API key
        in: header
        name: API-Key
        required: true
        type: string
      - description: workspace id
        in: path
        name: id
        required: true
        type: string
      - description: project id
        in: path
        name: project_id
        required: true
        type: string
      - description: page number
        in: query
        name: page
        type: integer
      - description: page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SegmentListInternalResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: gets a list of segments of a project with pagemanager representation
        of filters
      tags:
      - Internal
