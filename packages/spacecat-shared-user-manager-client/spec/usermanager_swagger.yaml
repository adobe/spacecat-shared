        "401":
          description: Unauthorized, invalid or missing API key
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden, insufficient permissions
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
