        It allows filtering of projects based on user access roles or permissions.
        Only those projects are returned where the user has access.
        User roles and permissions are determined by the following rules:
        - Workspace Owners, Admins, and Editors have editor-level access to all projects in the workspace.
        - Workspace Viewers are granted view-level access to all projects in the workspace.
        - Specific roles, such as collaborators or content writers, control project-level access.
        Use query parameters to refine the results, including user ID and pagination options.
