  /workspaces/{id}/projects/{project_id}/segments:
    post:
      consumes:
      - application/json
      description: |-
        creates a new segment in a specified project
        **<u>conditions :</u>**
        `column_name` is one of *url, url_list, keyword, keyword_list, traffic, position, search_volume,
        keyword_intent, country, device, clicks, impressions, ctr, gsc_position*
        `operator` is one of *equal, not_equal, begin, not_begin, end, not_end, contain,
        not_contain, greater, less, greater_equal, less_equal, between, one_of, in_list*
        *url_list* only can be used with *in_list* operator. Only zero or one url_list is allowed in the whole conditions array.
        *keyword_list* only can be used with *in_list* operator.
        **<u>filters :</u>**
        `column_name` is one of *url, url_list, keyword, keyword_list, traffic, position, search_volume,
        keyword_intent, country, device, clicks, impressions, ctr, gsc_position*.
        `operator` is one of *and, or, equal, not_equal, begin, not_begin, end, not_end, contain,
        not_contain, greater, less, greater_equal, less_equal, in_list*.
        `value` is string type. It becomes array of string in case of *in_list* operator as an exceptional case.
        *Notes*:
        * *url_list* only can be used with *in_list* operator. Only zero or one url_list is allowed in the whole filters array.
        * *keyword_list* only can be used with *in_list* operator.
        * *filters* logical operators *and, or* don't have *column_name, value* and must have nested *filters*.
        * *filters* logical operators *and, or* can have maximum depth up to 5 levels from the root.
        * *filters* non-logical operators must have *column_name, value* and must not have nested *filters*.
        * *filters* non-logical operators can have maximum 20 leaves in a single filter object.
      operationId: project-segment-create
      parameters:
      - description: JWT Token
        in: header
        name: Auth-Data-Jwt
        required: true
        type: string
      - description: workspace id
        in: path
        name: id
        required: true
        type: string
      - description: project id
        in: path
        name: project_id
        required: true
        type: string
      - description: segment details
        in: body
        name: SegmentUpsertForm
        required: true
        schema:
          $ref: '#/definitions/handlers.SegmentUpsertForm'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.SegmentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: creates a new segment for a project
      tags:
      - Segments
