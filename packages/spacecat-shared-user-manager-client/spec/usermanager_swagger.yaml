  /v1/admin/workspaces/api/workspaces/{id}/projects:
    get:
      description: Returns a paginated list of projects for a specific workspace with
        support for search, sorting, and status filtering using cursor-based pagination.
        If next_cursor is not provided, results are returned from the start. Use the
        next_cursor value from the response to fetch subsequent pages.
      operationId: activation-panel-projects-find
      parameters:
      - description: Semrush-admin Remote-User (UserId)
        in: header
        name: Remote-User
        required: true
        type: string
      - description: Admin API key
        in: header
        name: API-Key
        required: true
        type: string
      - description: Workspace ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Search term for filtering projects
        in: query
        name: search
        type: string
      - description: 'Sort direction (ASC/DESC, default: DESC)'
        enum:
        - ASC
        - DESC
        in: query
        name: sort_direction
        type: string
      - description: Field to sort by (created_at/last_updated_at)
        enum:
        - created_at
        - last_updated_at
        in: query
        name: sort_field
        type: string
      - description: Filter by project status
        enum:
        - draft
        - live
        - publishing
        - initial_publish_failed
        - live_with_unpublished_updates
        - subsequent_publish_failed
        in: query
        name: status
        type: string
      - description: Filter by product
        enum:
        - seo
        - ai
        - si
        - ci
        in: query
        name: product
        type: string
      - description: Cursor for pagination (obtain from previous response's next_cursor
          field). If omitted, starts from the beginning. Cursors are signed and validated
          to ensure query consistency.
        in: query
        name: next_cursor
        type: string
      - description: Page size (max 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AdminProjectsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: lists projects for a workspace with filtering and pagination
      tags:
      - ActivationPanel
  /v1/admin/workspaces/api/workspaces/{id}/projects/transfer:
    post:
      consumes:
      - application/json
      description: Transfers a list of projects from a source workspace to a target
        workspace. Only AI projects with transferable status can be moved. SEO and
        SI projects will be marked as failed. The endpoint validates target workspace
        product enablement, available resource limits (projects, keywords, pages,
        prompts, pagespeed URLs), and RBAC roles. Users with explicit project roles
        or workspace roles in the source workspace will be granted appropriate roles
        in the target workspace. Returns a map of failed project IDs with failure
        reasons (empty map indicates all projects transferred successfully).
      operationId: activation-panel-projects-transfer
      parameters:
      - description: Semrush-admin Remote-User (UserId)
        in: header
        name: Remote-User
        required: true
        type: string
      - description: Admin API key
        in: header
        name: API-Key
        required: true
        type: string
      - description: Source Workspace ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Transfer request containing project IDs and target workspace
          ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.adminProjectTransferForm'
      produces:
      - application/json
      responses:
        "200":
          description: "Map of failed project IDs to error reasons. Empty map means
            all projects transferred successfully. Example: {\\\"proj-uuid-1\\\":
            \\\"project\tis\tnot\ttransferable\\\", \\\"proj-uuid-2\\\": \\\"project\tnot\tfound\\\"}"
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized - Invalid or missing authentication
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "403":
          description: Forbidden - Missing editWorkspaces permission
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "422":
          description: Unprocessable Entity - Invalid workspace ID, project IDs, or
            request body validation errors
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
        "500":
          description: 'Internal Server Error - Possible errors: workspace not found,
            workspace product not enabled, insufficient SEO projects, insufficient
            AI projects, insufficient AI prompts, insufficient SI crawl budget, insufficient
            keywords, insufficient pagespeed URLs'
          schema:
            $ref: '#/definitions/http_server.BasicResponse'
      summary: transfers projects from one workspace to another
      tags:
      - ActivationPanel
